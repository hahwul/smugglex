# Real HTTP request-smuggling lab for smugglex, in Crystal.
#
# Each service is a single self-contained process (frontend proxy + backend in
# cooperating fibers) that produces an ACTUAL socket-level desync (not the
# emulated status/timing of ../validate.cr):
#
#   vuln    : CL-framing frontend  +  TE-honouring backend   (they disagree)
#   patched : CL-framing frontend  +  CL-first   backend     (they agree)
#
# Bring it up:   docker compose up --build -d
# Scan it:       smugglex http://127.0.0.1:8080/      # vulnerable -> findings
#                smugglex http://127.0.0.1:8081/      # patched    -> clean
# Tear down:     docker compose down
#
# Only scan THIS lab (or other targets you are authorized to test).

services:
  vuln:
    build: .
    environment:
      FRAMING: te # honour Transfer-Encoding over Content-Length (-> desync)
      BIND_HOST: 0.0.0.0
      FRONTEND_PORT: "8080"
      BACKEND_PORT: "9001"
      UPSTREAM_TIMEOUT: "6"
      CLIENT_BODY_TIMEOUT: "0.7"
    ports:
      - "8080:8080"

  patched:
    build: .
    environment:
      FRAMING: cl # frame by the first Content-Length; ignore Transfer-Encoding
      BIND_HOST: 0.0.0.0
      FRONTEND_PORT: "8081"
      BACKEND_PORT: "9002"
      UPSTREAM_TIMEOUT: "6"
      CLIENT_BODY_TIMEOUT: "0.7"
    ports:
      - "8081:8081"
